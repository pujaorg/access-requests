<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Access Request</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f6f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #24292f;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #57606a;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 500;
            font-size: 14px;
            color: #24292f;
            margin-bottom: 4px;
        }
        label .required {
            color: #d73a49;
        }
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            background: #ffffff;
            transition: border-color 0.2s;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #0969da;
            box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.15);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .hidden {
            display: none !important;
        }
        .feedback {
            font-size: 13px;
            margin-top: 4px;
        }
        .feedback.error {
            color: #d73a49;
        }
        .feedback.success {
            color: #2da44e;
        }
        .char-count {
            font-size: 12px;
            color: #57606a;
            text-align: right;
            margin-top: 4px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            background: #2da44e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #22863a;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            display: block;
            background: #dafbe1;
            color: #116329;
        }
        .message.error {
            display: block;
            background: #ffebe9;
            color: #82071e;
        }
        .divider {
            border: none;
            border-top: 1px solid #d0d7de;
            margin: 20px 0;
        }
        .dropdown-list {
            position: absolute;
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 1000;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }
        .dropdown-list .dropdown-item {
            padding: 8px 14px;
            cursor: pointer;
            font-size: 14px;
        }
        .dropdown-list .dropdown-item:hover {
            background: #f0f6fc;
        }
        .dropdown-list .dropdown-item.active {
            background: #0969da;
            color: #ffffff;
        }
        .dropdown-search {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-bottom: 1px solid #d0d7de;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }
        .dropdown-search:focus {
            border-bottom-color: #0969da;
        }
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #888;
            padding: 4px;
            border-radius: 50%;
            line-height: 1;
            user-select: none;
        }
        .clear-btn:hover {
            color: #d73a49;
            background: #f0f0f0;
        }
        #summarySection {
            display: none;
            height: auto;
            overflow: visible;
            padding: 16px;
            background: #f6f8fa;
            border-radius: 6px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 GitHub Access Request</h1>
        <p class="subtitle">Request access to a GitHub team or repository</p>

        <form id="accessForm">
            <!-- Access Type -->
            <div id="formSection">
                <div class="form-group">
                    <label for="accessType">Access Type <span class="required">*</span></label>
                    <select id="accessType" required>
                        <option value="team">Team Access (Permanent)</option>
                        <option value="repo">Repo Access (Temporary / Exception)</option>
                    </select>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label for="username">GitHub Username <span class="required">*</span></label>
                    <div style="position: relative;">
                        <input type="text" id="username" placeholder="Select a user..." readonly autocomplete="off" />
                        <span id="usernameClear" class="clear-btn" style="display: none;">✕</span>
                        <div id="usernameDropdown" class="dropdown-list">
                            <input type="text" id="usernameSearch" placeholder="Search users..." class="dropdown-search" />
                            <div id="usernameResults"></div>
                        </div>
                    </div>
                    <div id="usernameFeedback" class="feedback"></div>
                </div>

                <!-- Team Fields (default visible) -->
                <div id="teamFields">
                    <div class="form-group">
                        <label for="team">GitHub Team Name <span class="required">*</span></label>
                        <div style="position: relative;">
                            <input type="text" id="team" placeholder="Select a team..." readonly autocomplete="off" />
                            <span id="teamClear" class="clear-btn" style="display: none;">✕</span>
                            <div id="teamDropdown" class="dropdown-list">
                                <input type="text" id="teamSearch" placeholder="Search teams..." class="dropdown-search" />
                                <div id="teamResults"></div>
                            </div>
                        </div>
                        <div id="teamFeedback" class="feedback"></div>
                    </div>
                </div>

                <!-- Repo Fields (hidden by default) -->
                <div id="repoFields" class="hidden">
                    <div class="form-group">
                        <label for="repo">Repository Name <span class="required">*</span></label>
                        <div style="position: relative;">
                            <input type="text" id="repo" placeholder="Select a repository..." readonly autocomplete="off" />
                            <span id="repoClear" class="clear-btn" style="display: none;">✕</span>
                            <div id="repoDropdown" class="dropdown-list">
                                <input type="text" id="repoSearch" placeholder="Search repositories..." class="dropdown-search" />
                                <div id="repoResults"></div>
                            </div>
                        </div>
                        <div id="repoFeedback" class="feedback"></div>
                    </div>
                    <div class="form-group">
                        <label for="permission">Permission Level <span class="required">*</span></label>
                        <select id="permission">
                            <option value="pull" selected>Read</option>
                            <option value="push">Write</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration (days) <span class="required">*</span></label>
                        <input type="number" id="duration" min="1" max="30" value="7"/>
                        <div id="durationFeedback" class="feedback"></div>
                    </div>
                </div>

                <!-- Approver -->
                <div class="form-group">
                    <label for="approver">Approver <span class="required">*</span></label>
                    <div style="position: relative;">
                        <input type="text" id="approver" placeholder="Select an approver..." readonly autocomplete="off" />
                        <span id="approverClear" class="clear-btn" style="display: none;">✕</span>
                        <div id="approverDropdown" class="dropdown-list">
                            <input type="text" id="approverSearch" placeholder="Search approvers..." class="dropdown-search" />
                            <div id="approverResults"></div>
                        </div>
                    </div>
                    <div id="approverFeedback" class="feedback"></div>
                </div>

                <!-- Justification -->
                <div class="form-group">
                    <label for="justification">Justification <span class="required">*</span></label>
                    <textarea id="justification" placeholder="Why do you need this access?"></textarea>
                    <div id="justificationFeedback" class="feedback"></div>
                    <div class="char-count"><span id="charCount">0</span> / 500 characters</div>
                </div>
            </div>
            <hr class="divider" />

            <button type="button" class="btn" id="reviewBtn" style="background: #0969da;">Review Request</button>
            <div id="summarySection" style="display: none; background: #f6f8fa; padding: 16px; border-radius: 6px; margin-top: 16px;">
                <h3 style="margin-bottom: 8px;">Review Your Request</h3>
                <div id="summaryContent"></div>
            </div>
            <button type="submit" class="btn" id="submitBtn" style="display: none;">Confirm Submit</button>
            <button type="button" class="btn" id="backBtn" style="display: none; background: #6c757d; margin-top: 10px;">← Go Back and Edit</button>

        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
    // ============================================================
    // DOM refs
    // ============================================================
    const form = document.getElementById('accessForm');
    const accessType = document.getElementById('accessType');
    const username = document.getElementById('username');
    const usernameFeedback = document.getElementById('usernameFeedback');
    const team = document.getElementById('team');
    const teamFeedback = document.getElementById('teamFeedback');
    const repo = document.getElementById('repo');
    const repoFeedback = document.getElementById('repoFeedback');
    const permission = document.getElementById('permission');
    const duration = document.getElementById('duration');
    const durationFeedback = document.getElementById('durationFeedback');
    const justification = document.getElementById('justification');
    const justificationFeedback = document.getElementById('justificationFeedback');
    const approver = document.getElementById('approver');
    const approverFeedback = document.getElementById('approverFeedback');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const teamFields = document.getElementById('teamFields');
    const repoFields = document.getElementById('repoFields');

    // ============================================================
    // GitHub Configuration
    // ============================================================
    const GITHUB_ORG = 'pujaorg';
    const GITHUB_REPO = 'access-requests';
    const GITHUB_TOKEN = localStorage.getItem('github_token') || 'your-token';

    // Approvers list — EDIT THIS ARRAY to add/remove/rename approvers.
    const APPROVERS = ['pujadas02', 'beep024', 'approver3'];

    // ============================================================
    // Toggle fields based on access type
    // ============================================================
    accessType.addEventListener('change', () => {
        const isTeam = accessType.value === 'team';
        teamFields.classList.toggle('hidden', !isTeam);
        repoFields.classList.toggle('hidden', isTeam);

        [teamFeedback, repoFeedback, durationFeedback, usernameFeedback, approverFeedback, justificationFeedback]
            .forEach(el => el.textContent = '');

        message.style.display = 'none';
        message.textContent = '';
    });

    // ============================================================
    // Data loading (teams, members, repos) — 3 paginated API calls
    // ============================================================
    let allTeams = [];
    let allMembers = [];
    let allRepos = [];
    let isLoading = true;

    async function fetchAllPages(url) {
        let results = [];
        let page = 1;
        const maxPage = 10;
        let hasMore = true;
        while (hasMore && page <= maxPage) {
            const res = await fetch(`${url}?per_page=100&page=${page}`, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            const data = await res.json();
            if (!data.length) {
                hasMore = false;
            } else {
                results = results.concat(data);
                page++;
            }
        }
        return results;
    }

    async function loadData() {
        isLoading = true;
        try {
            console.log('Fetching teams, members, and repos...');
            [allTeams, allMembers, allRepos] = await Promise.all([
                fetchAllPages(`https://api.github.com/orgs/${GITHUB_ORG}/teams`),
                fetchAllPages(`https://api.github.com/orgs/${GITHUB_ORG}/members`),
                fetchAllPages(`https://api.github.com/orgs/${GITHUB_ORG}/repos`)
            ]);

            console.log('Teams loaded:', allTeams.length);
            console.log('Members loaded:', allMembers.length);
            console.log('Repos loaded:', allRepos.length);

            localStorage.setItem('cachedTeams', JSON.stringify(allTeams));
            localStorage.setItem('cachedMembers', JSON.stringify(allMembers));
            localStorage.setItem('cachedRepos', JSON.stringify(allRepos));
        } catch (error) {
            console.error('Error loading data:', error);
            loadFromCache();
        }
        isLoading = false;
    }

    function loadFromCache() {
        const cachedTeams = localStorage.getItem('cachedTeams');
        const cachedMembers = localStorage.getItem('cachedMembers');
        const cachedRepos = localStorage.getItem('cachedRepos');
        if (cachedTeams) allTeams = JSON.parse(cachedTeams);
        if (cachedMembers) allMembers = JSON.parse(cachedMembers);
        if (cachedRepos) allRepos = JSON.parse(cachedRepos);
    }

    // ============================================================
    // Generic searchable dropdown
    // Replaces the four near-identical username/team/repo/approver
    // blocks from the original file with one reusable factory.
    // Behavior (click to open, live search, loading state, clear
    // button, outside-click to close) is identical for every field.
    // ============================================================
    function setupDropdown({ inputId, clearId, dropdownId, searchId, resultsId, getItems, getLabel, emptyText, loadingText }) {
        const input = document.getElementById(inputId);
        const clearBtn = document.getElementById(clearId);
        const dropdown = document.getElementById(dropdownId);
        const search = document.getElementById(searchId);
        const results = document.getElementById(resultsId);

        function renderMessage(text) {
            results.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.textContent = text;
            item.style.color = '#888';
            item.style.cursor = 'default';
            results.appendChild(item);
        }

        function filter(query) {
            results.innerHTML = '';
            const matches = getItems(query).slice(0, 8);

            if (matches.length === 0) {
                renderMessage(emptyText);
                return;
            }

            matches.forEach(entry => {
                const label = getLabel(entry);
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = label;
                item.addEventListener('click', () => {
                    input.value = label;
                    clearBtn.style.display = 'inline';
                    dropdown.style.display = 'none';
                });
                results.appendChild(item);
            });
        }

        input.addEventListener('click', () => {
            dropdown.style.display = 'block';
            search.value = '';
            search.focus();

            if (isLoading && loadingText) {
                renderMessage(loadingText);
                return;
            }
            filter('');
        });

        search.addEventListener('input', function () {
            filter(this.value.trim().toLowerCase());
        });

        input.addEventListener('change', function () {
            clearBtn.style.display = this.value ? 'inline' : 'none';
        });

        clearBtn.addEventListener('click', () => {
            input.value = '';
            clearBtn.style.display = 'none';
            dropdown.style.display = 'none';
        });

        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });

        return { input };
    }

    setupDropdown({
        inputId: 'username', clearId: 'usernameClear', dropdownId: 'usernameDropdown',
        searchId: 'usernameSearch', resultsId: 'usernameResults',
        getItems: q => allMembers.filter(m => m.login.toLowerCase().includes(q)),
        getLabel: m => m.login,
        emptyText: 'No matching users found', loadingText: 'Loading users...'
    });

    setupDropdown({
        inputId: 'team', clearId: 'teamClear', dropdownId: 'teamDropdown',
        searchId: 'teamSearch', resultsId: 'teamResults',
        getItems: q => allTeams.filter(t => t.name.toLowerCase().includes(q)),
        getLabel: t => t.name,
        emptyText: 'No matching teams found', loadingText: 'Loading teams...'
    });

    setupDropdown({
        inputId: 'repo', clearId: 'repoClear', dropdownId: 'repoDropdown',
        searchId: 'repoSearch', resultsId: 'repoResults',
        getItems: q => allRepos.filter(r => r.full_name.toLowerCase().includes(q)),
        getLabel: r => r.full_name,
        emptyText: 'No matching repositories found', loadingText: 'Loading repositories...'
    });

    setupDropdown({
        inputId: 'approver', clearId: 'approverClear', dropdownId: 'approverDropdown',
        searchId: 'approverSearch', resultsId: 'approverResults',
        getItems: q => APPROVERS.filter(a => a.toLowerCase().includes(q)),
        getLabel: a => a,
        emptyText: 'No matching approvers found', loadingText: 'Loading approvers...'
    });

    // ============================================================
    // Justification character counter (live, no validation)
    // ============================================================
    justification.addEventListener('input', () => {
        charCount.textContent = justification.value.length;
    });

    // ============================================================
    // Validation
    // ============================================================
    async function validateUsername(usernameValue) {
        if (!usernameValue || usernameValue.trim().length === 0) {
            usernameFeedback.textContent = 'Please enter your GitHub username.';
            usernameFeedback.className = 'feedback error';
            return false;
        }

        if (allMembers.length === 0) {
            await loadData();
        }

        const exists = allMembers.some(m => m.login.toLowerCase() === usernameValue.trim().toLowerCase());
        if (!exists) {
            usernameFeedback.textContent = 'User not found in your organization.';
            usernameFeedback.className = 'feedback error';
            return false;
        }
        return true;
    }

    function validateJustification() {
        const text = justification.value.trim();
        const len = text.length;
        if (len === 0) {
            justificationFeedback.textContent = 'Please provide a justification.';
            justificationFeedback.className = 'feedback error';
            return false;
        }
        if (len < 10) {
            justificationFeedback.textContent = 'Minimum 10 characters.';
            justificationFeedback.className = 'feedback error';
            return false;
        }
        if (len > 500) {
            justificationFeedback.textContent = 'Maximum 500 characters.';
            justificationFeedback.className = 'feedback error';
            return false;
        }
        return true;
    }

    function validateApprover() {
        const val = approver.value.trim();
        if (!val) {
            approverFeedback.textContent = 'Please select an approver.';
            approverFeedback.className = 'feedback error';
            return false;
        }
        const exists = APPROVERS.some(a => a.toLowerCase() === val.toLowerCase());
        if (!exists) {
            approverFeedback.textContent = 'Please select an approver from the list.';
            approverFeedback.className = 'feedback error';
            return false;
        }
        return true;
    }

    function validateTeam() {
        if (accessType.value !== 'team') return true;
        const val = team.value.trim();
        if (!val) {
            teamFeedback.textContent = 'Please select a team.';
            teamFeedback.className = 'feedback error';
            return false;
        }
        const exists = allTeams.some(t => t.name.toLowerCase() === val.toLowerCase());
        if (!exists) {
            teamFeedback.textContent = 'Team not found in your organization.';
            teamFeedback.className = 'feedback error';
            return false;
        }
        return true;
    }

    function validateRepo() {
        if (accessType.value !== 'repo') return true;
        const val = repo.value.trim();
        if (!val) {
            repoFeedback.textContent = 'Please select a repository.';
            repoFeedback.className = 'feedback error';
            return false;
        }
        const exists = allRepos.some(r => r.full_name.toLowerCase() === val.toLowerCase());
        if (!exists) {
            repoFeedback.textContent = 'Repository not found in your organization.';
            repoFeedback.className = 'feedback error';
            return false;
        }
        return true;
    }

    function validateDuration() {
        if (accessType.value !== 'repo') return true;
        const val = parseInt(duration.value);
        if (isNaN(val) || val < 1 || val > 30) {
            durationFeedback.textContent = 'Duration must be between 1 and 30 days.';
            durationFeedback.className = 'feedback error';
            return false;
        }
        durationFeedback.textContent = '';
        durationFeedback.className = 'feedback';
        return true;
    }

    function validateAllFields() {
        [usernameFeedback, teamFeedback, repoFeedback, approverFeedback, justificationFeedback, durationFeedback]
            .forEach(el => el.textContent = '');

        const isUsernameValid = validateUsername(username.value);
        const isTeamValid = validateTeam();
        const isRepoValid = validateRepo();
        const isApproverValid = validateApprover();
        const isJustificationValid = validateJustification();
        const isDurationValid = validateDuration();

        return isUsernameValid && isTeamValid && isRepoValid && isApproverValid && isJustificationValid && isDurationValid;
    }

    // ============================================================
    // Build issue body
    // ============================================================
    function buildIssueBody() {
        const isTeam = accessType.value === 'team';
        const usernameVal = username.value.trim();
        const justificationVal = justification.value.trim();
        const durationVal = duration.value || 'N/A';

        let body = `### Your GitHub Username\n${usernameVal}\n\n`;
        body += `### Access Type\n${isTeam ? 'Team-based' : 'Repo-based'}\n\n`;
        body += `### Approver\n${approver.value.trim()}\n\n`;

        if (isTeam) {
            body += `### GitHub Team Name\n${team.value.trim()}\n\n`;
        } else {
            body += `### Repository Name\n${repo.value.trim()}\n\n`;
            body += `### Permission Level\n${permission.options[permission.selectedIndex].text}\n\n`;
            body += `### Duration\n${durationVal} days\n\n`;
        }

        body += `### Justification\n${justificationVal}`;
        return body;
    }

    // ============================================================
    // Review / Back handlers
    // ============================================================
    document.getElementById('reviewBtn').addEventListener('click', function() {
        if (!validateAllFields()) return;

        document.getElementById('formSection').style.display = 'none';

        const usernameVal = username.value.trim();
        const accessTypeVal = accessType.value === 'team' ? 'Team Access (Permanent)' : 'Repo Access (Temporary)';
        const permissionVal = permission.options[permission.selectedIndex].text;
        const durationVal = duration.value || 'N/A';
        const justificationVal = justification.value.trim();
        const approverVal = approver.value.trim();

        let summary = `
            <p><strong>GitHub Username:</strong> ${usernameVal}</p>
            <p><strong>Access Type:</strong> ${accessTypeVal}</p>
            <p><strong>Approver:</strong> ${approverVal}</p>
        `;

        if (accessType.value === 'team') {
            summary += `<p><strong>Team Name:</strong> ${team.value.trim()}</p>`;
        } else {
            summary += `
                <p><strong>Repository:</strong> ${repo.value.trim()}</p>
                <p><strong>Permission Level:</strong> ${permissionVal}</p>
                <p><strong>Duration:</strong> ${durationVal} days</p>
            `;
        }

        summary += `<p><strong>Justification:</strong> ${justificationVal}</p>`;

        document.getElementById('summaryContent').innerHTML = summary;
        document.getElementById('summarySection').style.display = 'block';
        document.getElementById('reviewBtn').style.display = 'none';
        document.getElementById('submitBtn').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
    });

    document.getElementById('backBtn').addEventListener('click', function() {
        document.getElementById('formSection').style.display = 'block';
        document.getElementById('summarySection').style.display = 'none';
        document.getElementById('reviewBtn').style.display = 'block';
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
    });

    // ============================================================
    // Submit handler (bound to form submit so Enter key works too)
    // ============================================================
    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        message.style.display = 'none';
        message.className = 'message';

        if (!validateAllFields()) {
            message.textContent = '❌ Please fix the errors above.';
            message.className = 'message error';
            message.style.display = 'block';
            return;
        }

        const issueBody = buildIssueBody();
        const isTeam = accessType.value === 'team';
        const title = isTeam
            ? `[Team Request]: ${username.value.trim()} → ${team.value.trim()}`
            : `[Repo Request]: ${username.value.trim()} → ${repo.value.trim()}`;

        const payload = {
            title: title,
            body: issueBody,
            labels: ['access-request', isTeam ? 'team-based' : 'repo-based']
        };

        submitBtn.disabled = true;
        submitBtn.textContent = 'Submitting...';

        try {
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/issues`,
                {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                }
            );

            if (response.ok) {
                message.textContent = '✅ Request submitted successfully! You will be notified once approved.';
                message.className = 'message success';
                message.style.display = 'block';
                form.reset();
                charCount.textContent = '0';
                accessType.dispatchEvent(new Event('change'));
                submitBtn.textContent = 'Submitted';
            } else {
                const error = await response.json();
                message.textContent = `❌ Failed to submit: ${error.message || 'Unknown error'}`;
                message.className = 'message error';
                message.style.display = 'block';
            }
        } catch (err) {
            message.textContent = `❌ Error: ${err.message}`;
            message.className = 'message error';
            message.style.display = 'block';
        }
    });

    // ============================================================
    // Initial state
    // ============================================================
    accessType.dispatchEvent(new Event('change'));
    loadData();
    </script>
</body>
</html>
