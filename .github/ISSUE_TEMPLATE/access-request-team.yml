name: Team Access Request
description: Request to be added to a GitHub team
title: "[Team Request]: "
labels: ["access-request", "team-based"]
body:
  - type: input
    id: username
    attributes:
      label: Your GitHub Username
      description: Enter your GitHub username
      placeholder: "e.g., yourusername"
    validations:
      required: true
 
  - type: dropdown
    id: team
    attributes:
      label: GitHub Team Name
      description: Select the team you need to be added to
      options:
        - "Select a team..."
        - team-beta-mix
        - team-alpha-read
    validations:
      required: true
 
  - type: input
    id: duration
    attributes:
      label: Duration
      description: Enter the number of hours or days you need access for
      placeholder: "e.g., 4 or 7"
    validations:
      required: true
 
  - type: dropdown
    id: unit
    attributes:
      label: Time Unit
      description: Choose whether the duration is in min or days
      options:
        - Minutes
        - Days
    validations:
      required: true
 
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why do you need to be added to this team?
      placeholder: "Explain your use case..."
    validations:
      required: true















