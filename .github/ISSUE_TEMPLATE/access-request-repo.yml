name: Repo Access Request (Exception)
description: Request direct access to a specific repository (for exceptions only)
title: "[Repo Request]: "
labels: ["access-request", "repo-based"]
body:
  - type: input
    id: username
    attributes:
      label: Your GitHub Username
      description: Enter your GitHub username 
      placeholder: e.g., yourusername
    validations:
      required: true
 
  - type: input
    id: repo
    attributes:
      label: Repository Name
      description: Enter the repository name in the format owner/repo-name
      placeholder: e.g., demo-org/repo-a
    validations:
      required: true
 
  - type: dropdown
    id: permission
    attributes:
      label: Permission Level
      options:
        - Read
        - Triage
        - Write
        - Maintain
        - Admin
    validations:
      required: true
 
  - type: input
    id: duration
    attributes:
      label: Duration
      description: Enter the number of minutes or days you need access for
      placeholder: e.g., 5 or 7
    validations:
      required: true
 
  - type: dropdown
    id: unit
    attributes:
      label: Time Unit
      description: Choose whether the duration is in minutes or days
      options:
        - Minutes
        - Days
    validations:
      required: true
 
  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why do you need access to this repository?
      placeholder: Explain your use case...
    validations:
      required: true
