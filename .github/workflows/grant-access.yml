name: Grant Access

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  grant:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check if actor is authorized
        env:
          ACTOR: ${{ github.actor }}
        run: |
          APPROVERS="pujadas02"
          IFS=',' read -r -a approver_array <<< "$APPROVERS"
          AUTHORIZED=false
          for approver in "${approver_array[@]}"; do
            if [[ "$ACTOR" == "$approver" ]]; then
              AUTHORIZED=true
              break
            fi
          done
          if [[ "$AUTHORIZED" == "false" ]]; then
            echo "Error: '$ACTOR' is not an authorized approver!"
            exit 1
          fi
          echo "'$ACTOR' is authorized."

      - name: Get issue details
        id: get_issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            > issue.json
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat issue.json | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "labels<<EOF" >> $GITHUB_OUTPUT
          cat issue.json | jq -r '.labels[].name' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Parse request details
        id: parse
        run: |
          BODY="${{ steps.get_issue.outputs.body }}"
          LABELS="${{ steps.get_issue.outputs.labels }}"
          extract_value() {
            local field="$1" body="$2"
            local temp="${body#*$field}"
            local value=$(echo "$temp" | grep -v '^[[:space:]]*$' | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [[ "$value" == "---"* ]] || [[ "$value" == "###"* ]] && value=""
            echo "$value"
          }
          USERNAME=$(extract_value "Your GitHub Username" "$BODY") || $(extract_value "GitHub Username" "$BODY")
          DURATION=$(extract_value "Duration" "$BODY")
          UNIT=$(extract_value "Time Unit" "$BODY" || extract_value "Unit" "$BODY" || echo "Days")
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "unit=$UNIT" >> $GITHUB_OUTPUT
          if [[ "$LABELS" == *"team-based"* ]]; then
            TEAM=$(extract_value "GitHub Team Name" "$BODY") || $(extract_value "Team Name" "$BODY")
            echo "type=team" >> $GITHUB_OUTPUT
            echo "target=$TEAM" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"repo-based"* ]]; then
            REPO=$(extract_value "Repository Name" "$BODY") || $(extract_value "Repository" "$BODY")
            [[ "$REPO" != *"/"* ]] && REPO="${{ github.repository_owner }}/$REPO"
            PERMISSION=$(extract_value "Permission Level" "$BODY") || $(extract_value "Permission" "$BODY")
            PERMISSION_LOWER=$(echo "$PERMISSION" | tr '[:upper:]' '[:lower:]')
            echo "type=repo" >> $GITHUB_OUTPUT
            echo "target=$REPO" >> $GITHUB_OUTPUT
            echo "permission=$PERMISSION_LOWER" >> $GITHUB_OUTPUT
          fi
          
      - name: Calculate expiration
        id: expiration
        run: |
          DURATION="${{ steps.parse.outputs.duration }}"
          UNIT="${{ steps.parse.outputs.unit }}"
          if [ -z "$DURATION" ]; then
            DURATION=5
          fi 
          if [ "$UNIT" == "Minutes" ]; then
            EXPIRATION=$(date -u -d "+$DURATION minutes" +"%Y-%m-%dT%H:%M:%SZ")
          else
            EXPIRATION=$(date -u -d "+$DURATION days" +"%Y-%m-%dT%H:%M:%SZ")
          fi
          echo "expiration=$EXPIRATION" >> $GITHUB_OUTPUT
          echo "Expiration: $EXPIRATION"

      - name: Grant team access
        id: grant_team
        if: steps.parse.outputs.type == 'team' && steps.parse.outputs.username != '' && steps.parse.outputs.target != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          TEAM: ${{ steps.parse.outputs.target }}
        run: |
          echo "Adding $USERNAME to team $TEAM..."
          ORG="${{ github.repository_owner }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/$ORG/teams/$TEAM/memberships/$USERNAME")
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "granted_type=team" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "Failed to add user to team. HTTP code: $RESPONSE"
            exit 1
          fi

      - name: Grant repo access
        id: grant_repo
        if: steps.parse.outputs.type == 'repo' && steps.parse.outputs.username != '' && steps.parse.outputs.target != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          REPO: ${{ steps.parse.outputs.target }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
        run: |
          echo "Adding $USERNAME to $REPO with $PERMISSION access..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/collaborators/$USERNAME" \
            -d "{\"permission\": \"$PERMISSION\"}")
          if [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "granted_type=repo" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "Failed to grant access. HTTP code: $RESPONSE"
            exit 1
          fi

      - name: Add expiration label
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          EXPIRATION: ${{ steps.expiration.outputs.expiration }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/labels" \
            -d "{\"labels\": [\"expires-$EXPIRATION\"]}"

      - name: Check if access was granted
        id: check_grant
        run: |
          GRANTED=false
          if [ "${{ steps.grant_team.outputs.success }}" == "true" ]; then
            GRANTED=true
            GRANTED_TYPE="team"
            TARGET="${{ steps.parse.outputs.target }}"
          fi
          if [ "${{ steps.grant_repo.outputs.success }}" == "true" ]; then
            GRANTED=true
            GRANTED_TYPE="repo"
            TARGET="${{ steps.parse.outputs.target }}"
            PERMISSION="${{ steps.parse.outputs.permission }}"
          fi
          echo "granted=$GRANTED" >> $GITHUB_OUTPUT
          echo "granted_type=$GRANTED_TYPE" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "permission=$PERMISSION" >> $GITHUB_OUTPUT

      # ============================================================
      # 🚀 PROJECT BOARD AUTOMATION STEPS
      # ============================================================

      - name: Move to Approved column
        if: steps.check_grant.outputs.granted == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ORG_NAME: "pujaorg"
          PROJECT_NUMBER: "1"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($org:String!,$projectNumber:Int!,$issueNumber:Int!){
              organization(login:$org){
                projectV2(number:$projectNumber){
                  items(first:100){
                    nodes{
                      id
                      content{
                        ... on Issue{
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -F org="$ORG_NAME" -F projectNumber="$PROJECT_NUMBER" -F issueNumber="$ISSUE_NUMBER" \
            --jq '.data.organization.projectV2.items.nodes[] | select(.content.number==$issueNumber) | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "::error::Issue not in project"
            exit 1
          fi

          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$project
                itemId:$item
                fieldId:$field
                value:{ singleSelectOptionId:$option }
              }){ projectV2Item { id } }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="98236657"

      - name: Move to Pending Revocation (repo-based)
        if: steps.check_grant.outputs.granted_type == 'repo' && steps.check_grant.outputs.granted == 'true'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ORG_NAME: "pujaorg"
          PROJECT_NUMBER: "1"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($org:String!,$projectNumber:Int!,$issueNumber:Int!){
              organization(login:$org){
                projectV2(number:$projectNumber){
                  items(first:100){
                    nodes{
                      id
                      content{
                        ... on Issue{
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -F org="$ORG_NAME" -F projectNumber="$PROJECT_NUMBER" -F issueNumber="$ISSUE_NUMBER" \
            --jq '.data.organization.projectV2.items.nodes[] | select(.content.number==$issueNumber) | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "::error::Issue not in project"
            exit 1
          fi

          EXPIRES_LABEL=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json labels -q '.labels[].name' | grep -oP 'expires-[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' | head -1)

          if [ -n "$EXPIRES_LABEL" ]; then
            gh api graphql -f query='
              mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$project
                  itemId:$item
                  fieldId:$field
                  value:{ singleSelectOptionId:$option }
                }){ projectV2Item { id } }
              }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="0a2b6e2b"
          fi

      - name: Move to Workflow Failure column
        if: steps.check_grant.outputs.granted == 'false'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ORG_NAME: "pujaorg"
          PROJECT_NUMBER: "1"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ITEM_ID=$(gh api graphql -f query='
            query($org:String!,$projectNumber:Int!,$issueNumber:Int!){
              organization(login:$org){
                projectV2(number:$projectNumber){
                  items(first:100){
                    nodes{
                      id
                      content{
                        ... on Issue{
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -F org="$ORG_NAME" -F projectNumber="$PROJECT_NUMBER" -F issueNumber="$ISSUE_NUMBER" \
            --jq '.data.organization.projectV2.items.nodes[] | select(.content.number==$issueNumber) | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "::error::Issue not in project"
            exit 1
          fi

          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$project
                itemId:$item
                fieldId:$field
                value:{ singleSelectOptionId:$option }
              }){ projectV2Item { id } }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="8acc5108"

      # ============================================================
      # 🔚 END PROJECT BOARD AUTOMATION
      # ============================================================

      - name: Comment on issue
        if: steps.check_grant.outputs.granted == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          TARGET: ${{ steps.check_grant.outputs.target }}
          TYPE: ${{ steps.check_grant.outputs.granted_type }}
          PERMISSION: ${{ steps.check_grant.outputs.permission }}
          EXPIRATION: ${{ steps.expiration.outputs.expiration }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$TYPE" == "team" ]; then
            COMMENT=" **Access Granted!**\n\n- **User:** @$USERNAME\n- **Team:** $TARGET\n- **Expires:** $EXPIRATION UTC\n- **Status:**  User has been added to the team."
          else
            COMMENT=" **Access Granted!**\n\n- **User:** @$USERNAME\n- **Repository:** $TARGET\n- **Permission:** $PERMISSION\n- **Expires:** $EXPIRATION UTC\n- **Status:**  Access has been granted."
          fi
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "{\"body\": \"$COMMENT\"}"

      - name: Close issue (only for team-based)
        if: success() && steps.parse.outputs.type == 'team'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            -d "{\"state\": \"closed\"}"
            
      - name: Comment on issue (failure)
        if: steps.check_grant.outputs.granted == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          COMMENT=" **Access Not Granted!**\n\n- **Status:**  Access could not be granted. Please check the workflow logs for details."
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "{\"body\": \"$COMMENT\"}"






