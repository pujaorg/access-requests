name: Grant Access
 
on:
  issues:
    types: [labeled]
 
permissions:
  contents: read
  issues: write
 
jobs:
  grant:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check if actor is authorized
        env:
          ACTOR: ${{ github.actor }}
        run: |
          APPROVERS="pujadas02"
          if [[ ! "$APPROVERS" == *"$ACTOR"* ]]; then
            echo "❌ Error: '$ACTOR' is not an authorized approver!"
            exit 1
          fi
          echo "✅ '$ACTOR' is authorized."
 
      - name: Get issue details
        id: get_issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            > issue.json
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat issue.json | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
      - name: Parse request details
        id: parse
        run: |
          BODY="${{ steps.get_issue.outputs.body }}"
          
          echo "===== RAW BODY ====="
          echo "$BODY"
          echo "===================="
          
          # Extract values using bash string manipulation
          extract_value() {
            local field="$1"
            local body="$2"
            
            # Remove the field header and get the next line(s)
            local temp="${body#*$field}"
            # Get the first line after the field (skip empty lines)
            local value=$(echo "$temp" | grep -v '^[[:space:]]*$' | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            # If value contains "---" or "###", it's not a real value
            if [[ "$value" == "---"* ]] || [[ "$value" == "###"* ]]; then
              value=""
            fi
            echo "$value"
          }
          
          # Extract username
          USERNAME=$(extract_value "Your GitHub Username" "$BODY")
          if [ -z "$USERNAME" ]; then
            USERNAME=$(extract_value "GitHub Username" "$BODY")
          fi
          
          # Determine type from labels
          LABELS="${{ github.event.issue.labels.*.name }}"
          
          if [[ "$LABELS" == *"team-based"* ]]; then
            TEAM=$(extract_value "GitHub Team Name" "$BODY")
            if [ -z "$TEAM" ]; then
              TEAM=$(extract_value "Team Name" "$BODY")
            fi
            echo "type=team" >> $GITHUB_OUTPUT
            echo "target=$TEAM" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"repo-based"* ]]; then
            REPO=$(extract_value "Repository Name" "$BODY")
            if [ -z "$REPO" ]; then
              REPO=$(extract_value "Repository" "$BODY")
            fi
            PERMISSION=$(extract_value "Permission Level" "$BODY")
            if [ -z "$PERMISSION" ]; then
              PERMISSION=$(extract_value "Permission" "$BODY")
            fi
            PERMISSION_LOWER=$(echo "$PERMISSION" | tr '[:upper:]' '[:lower:]')
            echo "type=repo" >> $GITHUB_OUTPUT
            echo "target=$REPO" >> $GITHUB_OUTPUT
            echo "permission=$PERMISSION_LOWER" >> $GITHUB_OUTPUT
          fi
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          
          # Debug output
          echo "===== PARSED VALUES ====="
          echo "Username: $USERNAME"
          echo "Type: ${{ steps.parse.outputs.type || 'not-set' }}"
          echo "Target: ${{ steps.parse.outputs.target || 'not-set' }}"
          echo "========================="
 
      - name: Grant team access
        if: steps.parse.outputs.type == 'team' && steps.parse.outputs.username != '' && steps.parse.outputs.target != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          TEAM: ${{ steps.parse.outputs.target }}
        run: |
          echo "Adding $USERNAME to team $TEAM..."
          ORG="${{ github.repository_owner }}"
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/$ORG/teams/$TEAM/memberships/$USERNAME")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to add user to team. HTTP code: $RESPONSE"
            exit 1
          fi
 
      - name: Grant repo access
        if: steps.parse.outputs.type == 'repo' && steps.parse.outputs.username != '' && steps.parse.outputs.target != ''
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          REPO: ${{ steps.parse.outputs.target }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
        run: |
          echo "Adding $USERNAME to $REPO with $PERMISSION access..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/collaborators/$USERNAME" \
            -d "{\"permission\": \"$PERMISSION\"}")
          
          if [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 204 ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ Failed to grant access. HTTP code: $RESPONSE"
            exit 1
          fi
 
      - name: Comment on issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          USERNAME: ${{ steps.parse.outputs.username }}
          TARGET: ${{ steps.parse.outputs.target }}
          TYPE: ${{ steps.parse.outputs.type }}
          PERMISSION: ${{ steps.parse.outputs.permission }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$TYPE" == "team" ]; then
            COMMENT="✅ **Access Granted!**\n\n- **User:** @$USERNAME\n- **Team:** $TARGET\n- **Status:** ✅ User has been added to the team."
          else
            COMMENT="✅ **Access Granted!**\n\n- **User:** @$USERNAME\n- **Repository:** $TARGET\n- **Permission:** $PERMISSION\n- **Status:** ✅ Access has been granted."
          fi
          
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments" \
            -d "{\"body\": \"$COMMENT\"}"
 
      - name: Close issue
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            -d "{\"state\": \"closed\"}"
