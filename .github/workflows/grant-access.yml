name: Grant Access
 
on:
  issues:
    types: [labeled]
 
permissions:
  contents: read
  issues: write
 
jobs:
  grant:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check if actor is authorized
        env:
          ACTOR: ${{ github.actor }}
        run: |
          APPROVERS="your-username-here,test-user-here"
          if [[ ! "$APPROVERS" == *"$ACTOR"* ]]; then
            echo "âťŚ Error: '$ACTOR' is not an authorized approver!"
            exit 1
          fi
          echo "âś… '$ACTOR' is authorized."
 
      - name: Get issue details
        id: get_issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" \
            > issue.json
          
          echo "===== ISSUE BODY ====="
          cat issue.json | jq -r '.body' | head -20
          echo "======================"
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat issue.json | jq -r '.body' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
      - name: Parse request details
        id: parse
        run: |
          BODY="${{ steps.get_issue.outputs.body }}"
          
          # Extract username
          USERNAME=$(echo "$BODY" | grep -i "Your GitHub Username" -A 1 | tail -1 | xargs)
          if [ -z "$USERNAME" ]; then
            USERNAME=$(echo "$BODY" | grep -oP '(?<=Your GitHub Username: ).*' | head -1 | xargs)
          fi
          
          # Determine type from labels
          LABELS="${{ github.event.issue.labels.*.name }}"
          
          echo "Username: $USERNAME"
          echo "Labels: $LABELS"
          
          if [[ "$LABELS" == *"team-based"* ]]; then
            TEAM=$(echo "$BODY" | grep -i "GitHub Team Name" -A 1 | tail -1 | xargs)
            if [ -z "$TEAM" ]; then
              TEAM=$(echo "$BODY" | grep -oP '(?<=GitHub Team Name: ).*' | head -1 | xargs)
            fi
            echo "type=team" >> $GITHUB_OUTPUT
            echo "target=$TEAM" >> $GITHUB_OUTPUT
          elif [[ "$LABELS" == *"repo-based"* ]]; then
            REPO=$(echo "$BODY" | grep -i "Repository Name" -A 1 | tail -1 | xargs)
            if [ -z "$REPO" ]; then
              REPO=$(echo "$BODY" | grep -oP '(?<=Repository Name: ).*' | head -1 | xargs)
            fi
            PERMISSION=$(echo "$BODY" | grep -i "Permission Level" -A 1 | tail -1 | xargs)
            if [ -z "$PERMISSION" ]; then
              PERMISSION=$(echo "$BODY" | grep -oP '(?<=Permission Level: ).*' | head -1 | xargs)
            fi
            PERMISSION_LOWER=$(echo "$PERMISSION" | tr '[:upper:]' '[:lower:]')
            echo "type=repo" >> $GITHUB_OUTPUT
            echo "target=$REPO" >> $GITHUB_OUTPUT
            echo "permission=$PERMISSION_LOWER" >> $GITHUB_OUTPUT
          fi
          
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
 
      - name: Debug Output
        run: |
          echo "Username: ${{ steps.parse.outputs.username }}"
          echo "Type: ${{ steps.parse.outputs.type }}"
          echo "Target: ${{ steps.parse.outputs.target }}"
 
      # Rest of the steps (Grant team access, Grant repo access, Comment, Close)
      # ... keep them as they were
