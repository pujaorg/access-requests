name: Add Issue to Project

on:
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest

    steps:
      - name: Add issue to GitHub Project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
        run: |
          gh project item-add 1 \
            --owner pujaorg \
            --url "${{ github.event.issue.html_url }}"
