name: Add Issue to Project

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
        run: |
          gh project item-add ${{ github.event.issue.number }} \
            --url "${{ github.event.issue.html_url }}" \
            --owner "pujaorg"
