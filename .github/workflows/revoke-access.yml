name: Revoke Expired Access
 
on:
  schedule:
    - cron: '0 0 * * *'   
  workflow_dispatch:      
 
permissions:
  contents: write
  issues: write
 
jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Revoke expired access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "Starting revocation check..."
          
          # Get all open issues with the access-request label
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues?labels=access-request&state=open&per_page=100" \
            > issues.json
          
          echo "Found open access requests:"
          cat issues.json | jq -r '.[] | "#\(.number): \(.title)"'
          
          # Note: Full revocation logic requires storing expiration dates
          # This is a placeholder that will be expanded later
          echo "Revocation check complete"
