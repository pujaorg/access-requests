name: Revoke Expired Access
 
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
 
permissions:
  contents: read
  issues: write
  actions: write
 
jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Revoke expired access
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -e
          echo "======================================"
          echo "🔍 Scanning for expired repo-based access..."
          echo "======================================"
 
          extract_value() {
            local field="$1" body="$2"
            local temp="${body#*$field}"
            local value=$(echo "$temp" | grep -v '^[[:space:]]*$' | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [[ "$value" == "---"* ]] || [[ "$value" == "###"* ]] && value=""
            echo "$value"
          }
 
          revoke_repo() {
            local user="$1" repo="$2" issue="$3"
            [[ "$repo" != *"/"* ]] && repo="$ORG/$repo"
            echo "Removing $user from repo $repo"
 
            # Remove user from repo
            curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$repo/collaborators/$user"
 
            # Add comment
            curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$issue/comments" \
              -d "{\"body\": \"🔄 Access revoked from repo: $repo\"}"
 
            # Close the issue
            curl -s -X PATCH -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/$REPO/issues/$issue" \
              -d "{\"state\": \"closed\"}"
          }
 
          # Fetch open repo-based issues
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues?labels=access-request,repo-based&state=open&per_page=50" \
            > issues.json
 
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Current time (UTC): $CURRENT_TIME"
 
          ISSUE_COUNT=$(cat issues.json | jq '. | length')
          echo "Found $ISSUE_COUNT open repo-based issues."
 
          if [ "$ISSUE_COUNT" -eq 0 ]; then
            echo "No open repo-based issues found. Exiting."
            exit 0
          fi
 
          # Loop through each issue
          for issue in $(cat issues.json | jq -r '.[] | @base64'); do
            _jq() { echo ${issue} | base64 --decode | jq -r ${1}; }
 
            ISSUE_NUMBER=$(_jq '.number')
            BODY=$(_jq '.body')
            LABELS=$(_jq '.labels[].name')
 
            echo "======================================"
            echo "📋 Processing issue #$ISSUE_NUMBER"
 
            # Extract expiration from labels
            EXPIRATION=$(echo "$LABELS" | grep -oP 'expires-\K[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' | head -1)
            echo "Expiration found: '$EXPIRATION'"
 
            if [ -z "$EXPIRATION" ]; then
              echo "⏭️ No expiration label found — skipping"
              continue
            fi
 
            if [[ "$CURRENT_TIME" > "$EXPIRATION" ]]; then
              echo "⏰ EXPIRED!"
              USERNAME=$(extract_value "Your GitHub Username" "$BODY" || extract_value "GitHub Username" "$BODY")
              REPO_NAME=$(extract_value "Repository Name" "$BODY" || extract_value "Repository" "$BODY")
              echo "Username: $USERNAME"
              echo "Repo: $REPO_NAME"
 
              # Remove the expiration label first
              EXPIRATION_LABEL=$(echo "$LABELS" | grep -oP 'expires-[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' | head -1)
              if [ -n "$EXPIRATION_LABEL" ]; then
                echo "Removing label: $EXPIRATION_LABEL"
                curl -s -X DELETE -H "Authorization: token $GITHUB_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/labels/$EXPIRATION_LABEL"
                echo "Label removal attempted."
              fi
 
              # Now revoke access and close issue
              revoke_repo "$USERNAME" "$REPO_NAME" "$ISSUE_NUMBER"
            else
              echo "⏳ Not expired yet."
            fi
          done
 
          echo "======================================"
          echo "✅ Revocation complete!"
          echo "======================================"
