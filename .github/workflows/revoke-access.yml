name: Revoke Expired Access
 
on:
  schedule:
    - cron: '*/5 * * * *'   # Runs every 5 minutes
  workflow_dispatch:
 
permissions:
  contents: read
  issues: write
  actions: write
 
jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Get all closed issues
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          ORG: ${{ github.repository_owner }}
        run: |
          echo "🔍 Scanning for expired access..."
          
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues?state=closed&per_page=50" \
            > issues.json
          
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "Current time: $CURRENT_TIME"
          
          # Same reliable extraction function used in grant workflow
          extract_value() {
            local field="$1"
            local body="$2"
            
            # Remove everything before the field
            local temp="${body#*$field}"
            # Get the first non-empty line after the field
            local value=$(echo "$temp" | grep -v '^[[:space:]]*$' | head -1 | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            # If value is a Markdown heading or horizontal rule, it's not a real value
            if [[ "$value" == "---"* ]] || [[ "$value" == "###"* ]]; then
              value=""
            fi
            echo "$value"
          }
          
          for issue in $(cat issues.json | jq -r '.[] | @base64'); do
            _jq() {
              echo ${issue} | base64 --decode | jq -r ${1}
            }
            
            ISSUE_NUMBER=$(_jq '.number')
            ISSUE_BODY=$(_jq '.body')
            ISSUE_LABELS=$(_jq '.labels[].name')
            
            # Check if it's an access request (team-based or repo-based)
            if [[ ! "$ISSUE_LABELS" == *"team-based"* ]] && [[ ! "$ISSUE_LABELS" == *"repo-based"* ]]; then
              if [[ ! "$ISSUE_LABELS" == *"access-request"* ]]; then
                continue
              fi
            fi
            
            # Extract expiration from labels
            EXPIRATION=$(echo "$ISSUE_LABELS" | grep -oP 'expires-\K[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' | head -1)
            
            if [ -z "$EXPIRATION" ]; then
              continue
            fi
            
            echo "🔎 Issue #$ISSUE_NUMBER: Expires at $EXPIRATION"
            
            if [[ "$CURRENT_TIME" > "$EXPIRATION" ]]; then
              echo "⏰ Issue #$ISSUE_NUMBER: EXPIRED!"
              
              # Extract username using the reliable function
              USERNAME=$(extract_value "Your GitHub Username" "$ISSUE_BODY")
              if [ -z "$USERNAME" ]; then
                USERNAME=$(extract_value "GitHub Username" "$ISSUE_BODY")
              fi
              
              if [[ "$ISSUE_LABELS" == *"team-based"* ]]; then
                TEAM=$(extract_value "GitHub Team Name" "$ISSUE_BODY")
                if [ -z "$TEAM" ]; then
                  TEAM=$(extract_value "Team Name" "$ISSUE_BODY")
                fi
                
                if [ -n "$USERNAME" ] && [ -n "$TEAM" ]; then
                  echo "Removing $USERNAME from team $TEAM..."
                  curl -X DELETE \
                    -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/orgs/$ORG/teams/$TEAM/memberships/$USERNAME"
                  
                  curl -X POST \
                    -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
                    -d "{\"body\": \"🔄 **Access Revoked!**\n\n- **User:** @$USERNAME\n- **Team:** $TEAM\n- **Status:** ✅ User has been removed from the team.\"}"
                else
                  echo "⚠️ Missing username or team name — skipping"
                fi
                
              elif [[ "$ISSUE_LABELS" == *"repo-based"* ]]; then
                REPO_NAME=$(extract_value "Repository Name" "$ISSUE_BODY")
                if [ -z "$REPO_NAME" ]; then
                  REPO_NAME=$(extract_value "Repository" "$ISSUE_BODY")
                fi
                if [[ "$REPO_NAME" != *"/"* ]]; then
                  REPO_NAME="$ORG/$REPO_NAME"
                fi
                
                if [ -n "$USERNAME" ] && [ -n "$REPO_NAME" ]; then
                  echo "Removing $USERNAME from repo $REPO_NAME..."
                  curl -X DELETE \
                    -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/$REPO_NAME/collaborators/$USERNAME"
                  
                  curl -X POST \
                    -H "Authorization: token $GITHUB_TOKEN" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments" \
                    -d "{\"body\": \"🔄 **Access Revoked!**\n\n- **User:** @$USERNAME\n- **Repository:** $REPO_NAME\n- **Status:** ✅ User has been removed from the repository.\"}"
                else
                  echo "⚠️ Missing username or repo name — skipping"
                fi
              fi
            else
              echo "⏳ Issue #$ISSUE_NUMBER: Not expired yet."
            fi
          done
          
          echo "✅ Revocation check complete!"
 
