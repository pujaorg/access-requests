name: Revoke Expired Access
 
on:
  schedule:
    - cron: '*/10 * * * *'   # Runs every 10 minutes for testing
  workflow_dispatch:          # Allows manual trigger
 
permissions:
  contents: read
  issues: write
 
jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - name: Get all closed issues with expiration labels
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔍 Checking for expired access..."
          
          # Get all closed issues with access-request label
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/issues?labels=access-request&state=closed&per_page=100" \
            > closed_issues.json
          
          echo "📋 Found closed issues:"
          cat closed_issues.json | jq -r '.[] | "#\(.number): \(.title)"'
          
          # Extract expiration from labels or comments
          # This is a placeholder - full revocation logic will be added here
          echo "✅ Revocation check complete"
