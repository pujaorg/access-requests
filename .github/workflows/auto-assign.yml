name: Auto-Assign Approvers
run-name: Auto-Assign #${{ github.event.issue.number }}
 
on:
  issues:
    types: [opened]
 
permissions:
  issues: write
 
jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Get issue details
        id: get_issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_BODY=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" | jq -r '.body')
 
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
 
      - name: Parse and assign approver
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BODY: ${{ steps.get_issue.outputs.body }}
        run: |
          # Extract approver — look for "### Approver" followed by a value
          APPROVER=$(echo "$BODY" | sed -n '/### Approver/,/^$/p' | grep -v '### Approver' | head -1 | xargs)
 
          if [ -z "$APPROVER" ]; then
            echo "No approver found — skipping"
            exit 0
          fi
 
          echo "Assigning to: $APPROVER"
 
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/assignees" \
            -d "{\"assignees\": [\"$APPROVER\"]}"
