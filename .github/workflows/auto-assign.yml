name: Auto-Assign Approvers
 
on:
  issues:
    types: [opened]
 
permissions:
  issues: write
 
jobs:
  assign:
    # Only run for access request issues
    if: |
      contains(github.event.issue.labels.*.name, 'team-based') ||
      contains(github.event.issue.labels.*.name, 'repo-based') ||
      contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - name: Auto-assign issue to approvers
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          APPROVERS="pujadas02"
          # Convert comma-separated list to JSON array
          ASSIGNEES=$(echo "$APPROVERS" | sed 's/,/","/g')
          ASSIGNEES="[\"$ASSIGNEES\"]"
          
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/assignees" \
            -d "{\"assignees\": $ASSIGNEES}"
