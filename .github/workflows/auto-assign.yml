name: Auto-Assign Approvers
 
on:
  issues:
    types: [opened]
 
permissions:
  issues: write
 
jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Get issue details
        id: get_issue
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # Get the issue body
          ISSUE_BODY=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER" | jq -r '.body')
 
          # Extract the approver from the issue body
          # The issue body has: "### Approver\nusername"
          APPROVER=$(echo "$ISSUE_BODY" | grep -oP '(?<=### Approver\n).*' | head -1 | xargs)
 
          echo "approver=$APPROVER" >> $GITHUB_OUTPUT
 
      - name: Assign issue to approver
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          APPROVER: ${{ steps.get_issue.outputs.approver }}
        run: |
          if [ -z "$APPROVER" ]; then
            echo "No approver found — skipping"
            exit 0
          fi
 
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER/assignees" \
            -d "{\"assignees\": [\"$APPROVER\"]}"
