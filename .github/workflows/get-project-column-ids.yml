name: Get Column IDs

on:
  workflow_dispatch:

jobs:
  get-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Get project and column IDs
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
        run: |
          echo "Fetching project and column IDs..."

          # Get project data
          gh api graphql -f query='
            query {
              organization(login: "pujaorg") {
                projectV2(number: 1) {
                  id
                  title
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' > output.json

          echo "======================================"
          echo "📋 PROJECT ID (use this in workflows)"
          echo "======================================"
          cat output.json | jq -r '.data.organization.projectV2.id'
          echo ""

          echo "======================================"
          echo "📋 COLUMN IDs (copy these)"
          echo "======================================"
          cat output.json | jq -r '.data.organization.projectV2.fields.nodes[] | select(.name=="Status") | .options[] | "\(.name): \(.id)"'
          
          echo ""
          echo "======================================"
          echo "✅ Done!"
          echo "======================================"
