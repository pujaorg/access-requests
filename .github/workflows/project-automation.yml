name: Project Board Automation
run-name: Project Automation ${{ github.event.issue.number }}

on:
  issues:
    types: [assigned, labeled, closed]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Debug - List all columns
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
        run: |
          echo "Fetching column IDs..."
          gh api graphql -f query='
            query {
              organization(login: "pujaorg") {
                projectV2(number: 1) {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' | jq '.data.organization.projectV2.fields.nodes[] | select(.name=="Status") | {fieldId: .id, options: .options}'

      - name: Move issue based on event
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ORG_NAME: "pujaorg"
          PROJECT_NUMBER: "1"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -e

          # Column IDs
          UNDER_REVIEW="47fc9ee4"
          REJECTED="18d54346"
          COMPLETED="636d8cb2"
          NEEDS_INFO="73dc85f8"

          if [[ "$ACTION" == "assigned" ]]; then
            COLUMN_ID="$UNDER_REVIEW"
          elif [[ "$ACTION" == "closed" ]]; then
            COLUMN_ID="$COMPLETED"
          elif [[ "$LABEL" == "denied" ]]; then
            COLUMN_ID="$REJECTED"
          elif [[ "$LABEL" == "needs-info" ]]; then
            COLUMN_ID="$NEEDS_INFO"
          else
            echo "No matching rule"
            exit 0
          fi

          echo "Moving issue #$ISSUE_NUMBER to column: $COLUMN_ID"
          echo "Using FIELD_ID: $FIELD_ID"

          # Find the project item
          ITEM_ID=$(gh api graphql -f query='
            query($org:String!,$projectNumber:Int!){
              organization(login:$org){
                projectV2(number:$projectNumber){
                  items(first:100){
                    nodes{
                      id
                      content{
                        ... on Issue{
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -F org="$ORG_NAME" -F projectNumber="$PROJECT_NUMBER" | jq -r ".data.organization.projectV2.items.nodes[] | select(.content.number == $ISSUE_NUMBER) | .id")

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" == "null" ]; then
            echo "::error::Issue not in project"
            exit 1
          fi

          echo "ITEM_ID: $ITEM_ID"

          # Move the issue
          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$project
                itemId:$item
                fieldId:$field
                value:{ singleSelectOptionId:$option }
              }){ projectV2Item { id } }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="$COLUMN_ID"

          echo "✅ Done"
