name: Project Board Automation

on:
  issues:
    types: [opened, assigned, labeled, closed]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue based on event
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          ISSUE_ID: ${{ github.event.issue.node_id }}
          LABEL: ${{ github.event.label.name }}
          ACTION: ${{ github.event.action }}
        run: |
          # Column IDs
          NEW_REQUESTS="f75ad846"
          UNDER_REVIEW="47fc9ee4"
          REJECTED="18d54346"
          COMPLETED="636d8cb2"
          NEEDS_INFO="73dc85f8"

          # Determine which column to move to
          if [[ "$ACTION" == "opened" ]]; then
            COLUMN_ID="$NEW_REQUESTS"
            echo "New issue → New Requests"
          elif [[ "$ACTION" == "assigned" ]]; then
            COLUMN_ID="$UNDER_REVIEW"
            echo "Issue assigned → Under Review"
          elif [[ "$LABEL" == "denied" ]]; then
            COLUMN_ID="$REJECTED"
            echo "Denied label → Rejected"
          elif [[ "$LABEL" == "needs-info" ]]; then
            COLUMN_ID="$NEEDS_INFO"
            echo "Needs Info label → Needs Info"
          elif [[ "$ACTION" == "closed" ]]; then
            COLUMN_ID="$COMPLETED"
            echo "Issue closed → Completed"
          else
            echo "No matching event — skipping"
            exit 0
          fi

          # Move the issue
          gh api graphql -f query='
            mutation($project: ID!, $issue: ID!, $column: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $issue
                fieldId: "STATUS"
                value: { singleSelectOptionId: $column }
              }) {
                projectV2Item { id }
              }
            }' -F project="$PROJECT_ID" -F issue="$ISSUE_ID" -F column="$COLUMN_ID"

          echo "✅ Issue moved to column"
