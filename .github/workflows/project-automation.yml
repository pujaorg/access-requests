name: Project Board Automation

on:
  issues:
    types: [assigned, labeled, closed]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue based on event
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTION: ${{ github.event.action }}
          LABEL: ${{ github.event.label.name }}
        run: |
          set -e

          # Column IDs
          NEW_REQUESTS="f75ad846"
          UNDER_REVIEW="47fc9ee4"
          REJECTED="18d54346"
          COMPLETED="636d8cb2"
          NEEDS_INFO="73dc85f8"

          if [[ "$ACTION" == "assigned" ]]; then
            COLUMN_ID="$UNDER_REVIEW"
          elif [[ "$ACTION" == "closed" ]]; then
            COLUMN_ID="$COMPLETED"
          elif [[ "$LABEL" == "denied" ]]; then
            COLUMN_ID="$REJECTED"
          elif [[ "$LABEL" == "needs-info" ]]; then
            COLUMN_ID="$NEEDS_INFO"
          else
            echo "No matching rule"
            exit 0
          fi

          echo "Moving issue #$ISSUE_NUMBER to column: $COLUMN_ID"

          # Get the project item ID
          ITEM_ID=$(gh api graphql -f query='
            query($org:String!,$projectNumber:Int!,$issueNumber:Int!){
              organization(login:$org){
                projectV2(number:$projectNumber){
                  items(first:100){
                    nodes{
                      id
                      content{
                        ... on Issue{
                          number
                        }
                      }
                    }
                  }
                }
              }
            }' -F org="pujaorg" -F projectNumber=1 -F issueNumber="$ISSUE_NUMBER" --jq '.data.organization.projectV2.items.nodes[] | select(.content.number == $issueNumber) | .id')

          if [ -z "$ITEM_ID" ]; then
            echo "::error::Issue not in project"
            exit 1
          fi

          echo "ITEM_ID: $ITEM_ID"

          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$option:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$project
                itemId:$item
                fieldId:$field
                value:{ singleSelectOptionId:$option }
              }){ projectV2Item { id } }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F option="\"$COLUMN_ID\""

          echo "✅ Done"
