name: Project Board Automation

on:
  issues:
    types: [opened, assigned, labeled, closed, unassigned]

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue based on event
        env:
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION }}
          PROJECT_ID: "PVT_kwDOEi48RM4BeAPn"
          FIELD_ID: "PVTSSF_lADOEi48RM4BeAPnzhYdoh0"
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          LABEL: ${{ github.event.label.name }}
          ACTION: ${{ github.event.action }}
        run: |
          # Column IDs
          NEW_REQUESTS="f75ad846"
          UNDER_REVIEW="47fc9ee4"
          REJECTED="18d54346"
          COMPLETED="636d8cb2"
          NEEDS_INFO="73dc85f8"

          # Determine which column to move to
          if [[ "$ACTION" == "opened" ]]; then
            COLUMN_ID="$NEW_REQUESTS"
            echo "New issue → New Requests"
          elif [[ "$ACTION" == "assigned" ]]; then
            COLUMN_ID="$UNDER_REVIEW"
            echo "Issue assigned → Under Review"
          elif [[ "$LABEL" == "denied" ]]; then
            COLUMN_ID="$REJECTED"
            echo "Denied label → Rejected"
          elif [[ "$LABEL" == "needs-info" ]]; then
            COLUMN_ID="$NEEDS_INFO"
            echo "Needs Info label → Needs Info"
          elif [[ "$ACTION" == "closed" ]]; then
            COLUMN_ID="$COMPLETED"
            echo "Issue closed → Completed"
          else
            echo "No matching event — skipping"
            exit 0
          fi

          # Get the project item ID for this issue
          echo "Looking up project item for issue #$ISSUE_NUMBER..."
          ITEM_ID=$(gh api graphql -f query='
            query($org: String!, $projectNumber: Int!, $issueNumber: Int!) {
              organization(login: $org) {
                projectV2(number: $projectNumber) {
                  items(first: 1, filter: {issue: {number: $issueNumber}}) {
                    nodes {
                      id
                    }
                  }
                }
              }
            }
          ' -F org="pujaorg" -F projectNumber=1 -F issueNumber="$ISSUE_NUMBER" --jq '.data.organization.projectV2.items.nodes[0].id')

          if [ -z "$ITEM_ID" ] || [ "$ITEM_ID" == "null" ]; then
            echo "⚠️ Could not find project item for issue #$ISSUE_NUMBER"
            exit 0
          fi

          echo "Project item ID: $ITEM_ID"

          # Move the issue using the Status field ID
          gh api graphql -f query='
            mutation($project: ID!, $item: ID!, $field: ID!, $column: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId: $item
                fieldId: $field
                value: { singleSelectOptionId: $column }
              }) {
                projectV2Item { id }
              }
            }' -F project="$PROJECT_ID" -F item="$ITEM_ID" -F field="$FIELD_ID" -F column="$COLUMN_ID"

          echo "✅ Issue moved to column"
